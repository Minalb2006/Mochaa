<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multiverse Portal (3D)</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(1200px 700px at 20% 10%, rgba(124, 58, 237, 0.25), rgba(0,0,0,0)),
                        radial-gradient(900px 600px at 80% 70%, rgba(34, 211, 238, 0.20), rgba(0,0,0,0)),
                        #050611;
            font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            color: #e5e7eb;
        }

        #app { position: fixed; inset: 0; }
        canvas { display: block; }

        .hud {
            position: fixed;
            top: 18px;
            left: 18px;
            width: min(380px, calc(100vw - 36px));
            padding: 16px 16px 14px;
            border-radius: 14px;
            background: rgba(10, 12, 26, 0.62);
            border: 1px solid rgba(255, 255, 255, 0.10);
            box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(10px);
        }

        .title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .badge {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: linear-gradient(135deg, #7c3aed, #22d3ee);
            display: grid;
            place-items: center;
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.35);
        }
        .badge span { font-size: 18px; }

        h1 {
            margin: 0;
            font-size: 16px;
            font-weight: 650;
            letter-spacing: 0.2px;
        }
        .sub {
            margin: 2px 0 0;
            font-size: 12px;
            color: rgba(229, 231, 235, 0.72);
            line-height: 1.35;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 12px;
        }

        .row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; }
        label { font-size: 12px; color: rgba(229, 231, 235, 0.78); }
        input[type="range"] { width: 100%; }
        .val { font-variant-numeric: tabular-nums; font-size: 12px; color: rgba(229, 231, 235, 0.85); }

        .btns { display: flex; gap: 10px; margin-top: 12px; }
        button {
            appearance: none;
            border: 1px solid rgba(255,255,255,0.16);
            background: rgba(255,255,255,0.07);
            color: #e5e7eb;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: transform 0.15s ease, background 0.15s ease;
        }
        button:hover { transform: translateY(-1px); background: rgba(255,255,255,0.11); }
        button.primary {
            border: none;
            background: linear-gradient(135deg, #7c3aed, #22d3ee);
            color: #070815;
        }

        .hint {
            margin-top: 10px;
            font-size: 11px;
            color: rgba(229, 231, 235, 0.65);
        }

        .hint kbd {
            padding: 2px 6px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.07);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 11px;
        }

        .loading {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            background: radial-gradient(800px 500px at 50% 30%, rgba(124, 58, 237, 0.20), rgba(0,0,0,0)), #050611;
            z-index: 10;
        }
        .loader {
            width: 66px;
            height: 66px;
            border-radius: 18px;
            background: linear-gradient(135deg, #7c3aed, #22d3ee);
            filter: drop-shadow(0 18px 70px rgba(34, 211, 238, 0.25));
            animation: spin 1.1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(1turn); } }
    </style>
</head>
<body>
    <div class="loading" id="loading"><div class="loader"></div></div>

    <div id="app"></div>

    <div class="hud">
        <div class="title">
            <div class="badge"><span>🌀</span></div>
            <div>
                <h1>Multiverse Portal (3D)</h1>
                <p class="sub">A living portal core with quantum filaments, lensing and drifting shards.</p>
            </div>
        </div>

        <div class="grid">
            <div class="row">
                <label for="stability">Stability</label>
                <div class="val" id="stabilityVal">0.62</div>
            </div>
            <input id="stability" type="range" min="0" max="1" step="0.01" value="0.62" />

            <div class="row">
                <label for="swirl">Swirl</label>
                <div class="val" id="swirlVal">0.78</div>
            </div>
            <input id="swirl" type="range" min="0" max="1" step="0.01" value="0.78" />

            <div class="row">
                <label for="shards">Shard Density</label>
                <div class="val" id="shardsVal">1.00</div>
            </div>
            <input id="shards" type="range" min="0" max="2" step="0.01" value="1" />
        </div>

        <div class="btns">
            <button class="primary" id="pulse">Pulse</button>
            <button id="reset">Reset</button>
        </div>

        <div class="hint">Drag to rotate. <kbd>Shift</kbd> + drag to pan. Mouse wheel to zoom.</div>
    </div>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="multiverse-portal.js"></script>
</body>
</html>
