<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neural Network Playground (3D)</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(900px 600px at 20% 15%, rgba(59, 130, 246, 0.16), rgba(0,0,0,0)),
                        radial-gradient(900px 600px at 80% 75%, rgba(168, 85, 247, 0.14), rgba(0,0,0,0)),
                        #05060a;
            font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            color: #e5e7eb;
        }
        #app { position: fixed; inset: 0; }
        canvas { display: block; }

        .panel {
            position: fixed;
            left: 18px;
            top: 18px;
            width: min(420px, calc(100vw - 36px));
            padding: 16px;
            border-radius: 14px;
            background: rgba(8, 10, 20, 0.62);
            border: 1px solid rgba(255,255,255,0.10);
            box-shadow: 0 18px 60px rgba(0,0,0,0.45);
            backdrop-filter: blur(10px);
        }

        .head { display: flex; gap: 10px; align-items: center; }
        .icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            display: grid;
            place-items: center;
            color: #070813;
            font-weight: 900;
        }

        h1 { margin: 0; font-size: 16px; font-weight: 650; }
        .sub { margin: 2px 0 0; font-size: 12px; color: rgba(229,231,235,0.72); line-height: 1.35; }

        .grid { margin-top: 12px; display: grid; gap: 10px; }
        .row { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; }
        label { font-size: 12px; color: rgba(229,231,235,0.78); }
        input[type="range"] { width: 100%; }
        .val { font-variant-numeric: tabular-nums; font-size: 12px; color: rgba(229,231,235,0.9); }

        .btns { display: flex; gap: 10px; margin-top: 12px; }
        button {
            border: 1px solid rgba(255,255,255,0.16);
            background: rgba(255,255,255,0.07);
            color: #e5e7eb;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 650;
            font-size: 12px;
            transition: transform 0.15s ease, background 0.15s ease;
        }
        button:hover { transform: translateY(-1px); background: rgba(255,255,255,0.11); }
        button.primary { border: none; background: linear-gradient(135deg, #3b82f6, #a855f7); color: #070813; }

        .hint { margin-top: 10px; font-size: 11px; color: rgba(229,231,235,0.65); }
        .hint kbd {
            padding: 2px 6px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.07);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 11px;
        }

        .loading {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            background: radial-gradient(800px 500px at 50% 40%, rgba(168, 85, 247, 0.14), rgba(0,0,0,0)), #05060a;
            z-index: 10;
        }
        .spinner {
            width: 66px;
            height: 66px;
            border-radius: 18px;
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            animation: spin 1.05s linear infinite;
            filter: drop-shadow(0 18px 70px rgba(59, 130, 246, 0.18));
        }
        @keyframes spin { to { transform: rotate(1turn); } }
    </style>
</head>
<body>
    <div class="loading" id="loading"><div class="spinner"></div></div>
    <div id="app"></div>

    <div class="panel">
        <div class="head">
            <div class="icon">N</div>
            <div>
                <h1>Neural Network Playground (3D)</h1>
                <p class="sub">Interactive 3D neuron graph with activation waves and learning pulses.</p>
            </div>
        </div>

        <div class="grid">
            <div class="row"><label for="layers">Layers</label><div class="val" id="layersVal">5</div></div>
            <input id="layers" type="range" min="3" max="9" step="1" value="5" />

            <div class="row"><label for="width">Width</label><div class="val" id="widthVal">8</div></div>
            <input id="width" type="range" min="4" max="14" step="1" value="8" />

            <div class="row"><label for="learning">Learning Rate</label><div class="val" id="learningVal">0.35</div></div>
            <input id="learning" type="range" min="0" max="1" step="0.01" value="0.35" />
        </div>

        <div class="btns">
            <button class="primary" id="train">Train Pulse</button>
            <button id="reset">Reset</button>
        </div>

        <div class="hint">Drag to rotate. <kbd>Shift</kbd> + drag to pan. Mouse wheel to zoom.</div>
    </div>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // Initialize when Three.js is loaded
        window.addEventListener('load', function() {
            if (window.THREE && window.THREE.OrbitControls) {
                const script = document.createElement('script');
                script.src = 'neural-playground.js';
                document.body.appendChild(script);
            } else {
                console.error('Three.js or OrbitControls not loaded');
            }
        });
    </script>
</body>
</html>
